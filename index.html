<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>New Tab</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060a0f;
      color: #c8dde8;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { font-size: 0.85rem; color: #4a6a7a; font-family: 'Orbitron', monospace; letter-spacing: 3px; font-size: 9px; text-transform: uppercase; }
    .panic-hint { font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #8a6aaa; margin-top: -6px; }
    .panic-hint span { color: #b97fff; font-weight: 700; }
    .status { font-size: 0.85rem; color: #00d4ff; letter-spacing: 0.1em; font-family: 'Orbitron', monospace; font-size: 9px; min-height: 1em; }
    .btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    button {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px 28px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 180px;
    }
    #blankBtn {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.4);
      color: #00d4ff;
      box-shadow: 0 0 20px rgba(0,212,255,0.15);
    }
    #blankBtn:hover {
      box-shadow: 0 0 35px rgba(0,212,255,0.4);
      border-color: #00d4ff;
      transform: translateY(-2px);
    }
    #blobBtn {
      background: rgba(123,47,255,0.08);
      border: 1px solid rgba(123,47,255,0.4);
      color: #b97fff;
      box-shadow: 0 0 20px rgba(123,47,255,0.15);
    }
    #blobBtn:hover {
      box-shadow: 0 0 35px rgba(123,47,255,0.4);
      border-color: #7b2fff;
      transform: translateY(-2px);
    }
    #dataBtn {
      background: rgba(0,255,128,0.06);
      border: 1px solid rgba(0,255,128,0.35);
      color: #00ff80;
      box-shadow: 0 0 20px rgba(0,255,128,0.12);
    }
    #dataBtn:hover {
      box-shadow: 0 0 35px rgba(0,255,128,0.35);
      border-color: #00ff80;
      transform: translateY(-2px);
    }
    #paste-hint {
      display: none;
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 999;
      padding-top: 6px;
      animation: fadeIn 0.4s ease;
    }
    #paste-hint.visible { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .paste-arrow {
      font-size: 100px;
      animation: bounce 0.8s ease-in-out infinite alternate;
      color: #ff2222;
      text-shadow: 0 0 20px rgba(255,0,0,0.9), 0 0 40px rgba(255,0,0,0.6), 0 0 80px rgba(255,0,0,0.3);
    }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-8px); } }
    .paste-text {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #00ff80;
      text-shadow: 0 0 20px rgba(0,255,128,0.9), 0 0 40px rgba(0,255,128,0.6), 0 0 80px rgba(0,255,128,0.3);
    }
  </style>
</head>

  <div id="paste-hint">

  </div>
  <div class="btns">
    <button id="blankBtn">about:blank</button>
    <button id="blobBtn">Blob Tab</button>
    <button id="dataBtn">Data: URL</button>
  </div>

    const statusEl = document.getElementById('status');
    const blankBtn = document.getElementById('blankBtn');
    const blobBtn = document.getElementById('blobBtn');
    const dataBtn = document.getElementById('dataBtn');
    const pasteHint = document.getElementById('paste-hint');

    blankBtn.addEventListener('click', () => {
      const newTab = window.open('about:blank', '_blank');
      if (newTab) {
        newTab.document.open();
        newTab.document.write(blobContent);
        newTab.document.close();
        statusEl.textContent = 'about:blank tab opened ✓';
        window.close();
      } else {
        statusEl.textContent = '⚠ Popup blocked';
      }
    });

    blobBtn.addEventListener('click', () => {
      const blob = new Blob([blobContent], { type: 'text/html' });
      const blobUrl = URL.createObjectURL(blob);
      const newTab = window.open(blobUrl, '_blank');
      if (newTab) {
        statusEl.textContent = 'Blob tab opened ✓';
        window.close();
      } else {
        statusEl.textContent = '⚠ Popup blocked';
      }
    });

    dataBtn.addEventListener('click', () => {
      const encoded = 'data:text/html;base64,' + btoa(unescape(encodeURIComponent(blobContent)));
      navigator.clipboard.writeText(encoded).then(() => {
        statusEl.textContent = 'data: URL copied ✓';
        pasteHint.classList.add('visible');
        setTimeout(() => { window.close(); }, 3000);
      }).catch(() => {
        // Clipboard blocked — fallback: show a copyable input
        statusEl.textContent = '⚠ Clipboard blocked — copy manually:';
        const inp = document.createElement('input');
        inp.value = encoded;
        inp.style.cssText = 'width:320px;padding:8px 12px;background:rgba(0,255,128,0.06);border:1px solid rgba(0,255,128,0.35);border-radius:6px;color:#00ff80;font-family:monospace;font-size:10px;outline:none;margin-top:4px;';
        inp.readOnly = true;
        document.querySelector('.btns').insertAdjacentElement('afterend', inp);
        inp.select();
        pasteHint.classList.add('visible');
      });
    });
  </script>
