<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.4s ease; }
html, body { width: 100%; height: 100%; }
body {
background-color: #000;
color: #f5f5f7;
font-family: 'Rajdhani', sans-serif;
display: flex; align-items: center; justify-content: center;
overflow: hidden; position: relative;
}
/* light mode override */
body.light-mode { background-color: #f5f5f7; color: #1d1d1f; }
body.light-mode .hub-box { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(0, 0, 0, 0.05); }
body.light-mode button.l-btn { background: rgba(0, 0, 0, 0.03); color: #1d1d1f; }
body.light-mode .t-tip { background: rgba(255, 255, 255, 0.9); }
body.light-mode .tag { color: #00b359; background: rgba(0, 179, 89, 0.15); }
body.light-mode .panic p span { border-color: rgba(0,0,0,0.05); background: rgba(0,0,0,0.03); }
body.light-mode .tt-btn { background: rgba(255,255,255,0.6); color: #1d1d1f; }

/* Canvas for Grid Dots */
#grid-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
}

/* Ambient Orbs */
.orb { position: fixed; border-radius: 50%; filter: blur(90px); z-index: -2; opacity: 0.4; animation: float 15s ease-in-out infinite alternate; pointer-events: none; }
.o1 { width: 45vw; height: 45vw; max-width: 500px; max-height: 500px; background: #00e5ff; top: -10%; left: -10%; }
.o2 { width: 40vw; height: 40vw; max-width: 450px; max-height: 450px; background: #9d4edd; bottom: -10%; right: -10%; animation-delay: -7s; }

@keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 30px) scale(1.05); } }

.tt-btn {
position: fixed; top: 24px; right: 24px;
background: rgba(10, 10, 10, 0.45); border: 1px solid rgba(255, 255, 255, 0.05); color: #f5f5f7;
padding: 10px 16px; border-radius: 20px; cursor: pointer;
font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700;
text-transform: uppercase; backdrop-filter: blur(24px); z-index: 50;
}
.tt-btn:hover { transform: translateY(-2px); }

.hub-box {
position: relative; background: rgba(10, 10, 10, 0.45);
backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 32px;
padding: 56px 48px; width: 90%; max-width: 800px; text-align: center;
box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4); z-index: 10;
animation: floatHub 8s ease-in-out infinite alternate;
}

@keyframes floatHub { 0% { transform: translateY(0px); } 100% { transform: translateY(-8px); } }

/* Gradient Title */
h1 { 
    font-family: 'Orbitron', monospace; 
    font-size: 3rem; 
    font-weight: 900; 
    letter-spacing: 6px; 
    text-transform: uppercase; 
    margin-bottom: 8px; 
    background: linear-gradient(90deg, #00d4ff, #7b2fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2); 
}

.tw-wrap { height: 24px; margin-bottom: 40px; font-family: 'Orbitron', monospace; font-size: 0.95rem; color: #86868b; text-transform: uppercase; }
/* Blue Dynamic Text */
#tw { border-right: 2px solid #00d4ff; padding-right: 6px; animation: blink 0.7s steps(2, start) infinite; color: #00d4ff; }
@keyframes blink { to { border-color: transparent; } }

#stat { font-size: 0.85rem; letter-spacing: 2px; font-family: 'Orbitron', monospace; min-height: 24px; margin-bottom: 20px; font-weight: 700; color: #00d4ff; }

.btn-container { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 40px; width: 100%; }
.b-wrap { position: relative; display: inline-flex; }

button.l-btn {
background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); color: #f5f5f7;
font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
padding: 18px 28px; border-radius: 16px; cursor: pointer; min-width: 180px;
}

/* Specific Button Glows */
#btn1:hover { border-color: #00d4ff; box-shadow: 0 8px 24px rgba(0, 212, 255, 0.15); transform: translateY(-2px); color: #00d4ff; }
#btn2:hover { border-color: #7b2fff; box-shadow: 0 8px 24px rgba(123, 47, 255, 0.15); transform: translateY(-2px); color: #7b2fff; }
#btn3:hover { border-color: #00ff80; box-shadow: 0 8px 24px rgba(0, 255, 128, 0.15); transform: translateY(-2px); color: #00ff80; }

.t-tip {
position: absolute; bottom: calc(100% + 16px); left: 50%; transform: translateX(-50%) translateY(4px);
background: rgba(15, 15, 15, 0.85); border: 1px solid #00ff80; backdrop-filter: blur(20px);
border-radius: 14px; padding: 12px; width: max-content; pointer-events: none; opacity: 0; z-index: 100;
}
.b-wrap:hover .t-tip { opacity: 1; transform: translateX(-50%) translateY(0); }
.t-tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 6px solid transparent; border-top-color: #00ff80; }

.tag { display: block; font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; padding: 6px 14px; margin-bottom: 4px; color: #00ff80; background: rgba(0, 255, 128, 0.15); border-radius: 8px; text-align: left; }
.tag:last-child { margin-bottom: 0; }

.panic p { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; color: #86868b; text-transform: uppercase; }
.panic p span { color: #f5f5f7; border: 1px solid rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 8px; background: rgba(255, 255, 255, 0.03); }

/* popup hint */
#hint { display: none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); flex-direction: column; align-items: center; gap: 12px; z-index: 999; animation: fIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
#hint.show { display: flex; }
@keyframes fIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.h-arr { font-family: 'Orbitron', monospace; font-size: 18px; animation: bnc 0.8s ease-in-out infinite alternate; }
@keyframes bnc { from { transform: translateY(0); } to { transform: translateY(-8px); } }
.h-txt { font-weight: 600; text-transform: uppercase; background: rgba(10, 10, 10, 0.45); backdrop-filter: blur(12px); padding: 10px 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); font-size: 12px;}

input.fb { width: 100%; max-width: 380px; padding: 14px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; font-family: monospace; font-size: 11px; outline: none; margin-top: 16px; text-align: center; }

@media (max-width: 768px) {
.hub-box { padding: 40px 24px; border-radius: 24px; width: 92%; }
h1 { font-size: 2.2rem; }
.btn-container { flex-direction: column; gap: 12px; }
.b-wrap, button.l-btn, .t-tip { width: 100%; }
.tt-btn { top: 16px; right: 16px; }
}
</style>
</head>

// --- GRID DOT SYSTEM WITH GLOWING REPULSION ---
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouse = { x: null, y: null, radius: 100 }; // Repulsion radius

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initParticles();
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('mousemove', function(e) {
    mouse.x = e.x;
    mouse.y = e.y;
});
window.addEventListener('mouseout', function() {
    mouse.x = undefined;
    mouse.y = undefined;
});

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.originX = x;
        this.originY = y;
        this.size = 1.5;
    }
    update() {
        // Mouse Interaction
        if (mouse.x != undefined) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance < mouse.radius) {
                const forceDirectionX = dx / distance;
                const forceDirectionY = dy / distance;
                const force = (mouse.radius - distance) / mouse.radius;
                const directionX = forceDirectionX * force * 3; 
                const directionY = forceDirectionY * force * 3;
                this.x -= directionX;
                this.y -= directionY;
            } else {
                // Return to grid position
                if (this.x !== this.originX) {
                    let dx = this.x - this.originX;
                    this.x -= dx / 10;
                }
                if (this.y !== this.originY) {
                    let dy = this.y - this.originY;
                    this.y -= dy / 10;
                }
            }
        } else {
            // Return to grid position when no mouse
            if (this.x !== this.originX) {
                let dx = this.x - this.originX;
                this.x -= dx / 10;
            }
            if (this.y !== this.originY) {
                let dy = this.y - this.originY;
                this.y -= dy / 10;
            }
        }
    }
    draw() {
        // Check if particle is displaced from origin
        let distFromOrigin = Math.sqrt(Math.pow(this.x - this.originX, 2) + Math.pow(this.y - this.originY, 2));
        
        if (distFromOrigin > 1) {
            // Glowing White State (Repelled)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00e5ff";
            ctx.fillStyle = "#ffffff";
        } else {
            // Normal Gray State (Grid)
            ctx.shadowBlur = 0;
            ctx.fillStyle = document.body.classList.contains('light-mode') ? '#1d1d1f' : '#86868b';
        }
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        
        // Reset shadow for performance
        ctx.shadowBlur = 0;
    }
}

function initParticles() {
    particles = [];
    // Create grid
    let spacing = 40;
    for (let x = 0; x < canvas.width; x += spacing) {
        for (let y = 0; y < canvas.height; y += spacing) {
            particles.push(new Particle(x, y));
        }
    }
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
    }
    requestAnimationFrame(animateParticles);
}

resizeCanvas();
animateParticles();

// --- TYPING EFFECT ---
var msgs = ["The best hub", "A lot of games", "The Fastest Proxy", "And the stealthiest site."];
var pIdx = 0; var cIdx = 0; var del = false;
function doTyping() {
    var el = document.getElementById('tw');
    var txt = msgs[pIdx];
    if (!del && cIdx <= txt.length) { el.innerText = txt.substring(0, cIdx); cIdx++; setTimeout(doTyping, 100); } 
    else if (del && cIdx >= 0) { el.innerText = txt.substring(0, cIdx); cIdx--; setTimeout(doTyping, 50); } 
    else if (!del && cIdx > txt.length) { del = true; setTimeout(doTyping, 2000); } 
    else { del = false; pIdx = (pIdx + 1) % msgs.length; cIdx = 0; setTimeout(doTyping, 500); }
}
doTyping();

// --- THEME TOGGLE ---
function toggleT() {
    document.body.classList.toggle('light-mode');
    var btn = document.getElementById('theme-btn');
    if(document.body.classList.contains('light-mode')) {
        btn.innerText = 'Dark Mode';
    } else {
        btn.innerText = 'Light Mode';
    }
}

// --- UNICODE SAFE DECODERS ---
function decodeBase64(base64) {
    try {
        var binaryString = atob(base64);
        var len = binaryString.length;
        var bytes = new Uint8Array(len);
        for (var i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return new TextDecoder('utf-8').decode(bytes);
    } catch (e) {
        return "";
    }
}

function decodeBase64ToBytes(base64) {
    var binaryString = atob(base64);
    var len = binaryString.length;
    var bytes = new Uint8Array(len);
    for (var i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
    }
    return bytes;
}

// --- BUTTON LOGIC ---
document.getElementById('btn1').onclick = function() {
    let t = window.open('about:blank', '_blank');
    if (t) { 
        // Decode Base64 to UTF-8 String
        t.document.open(); 
        t.document.write(decodeBase64(blobContent)); 
        t.document.close(); 
        document.getElementById('stat').innerText = 'Deployed about:blank'; 
    } 
    else { document.getElementById('stat').innerText = 'Popup Blocked'; }
};

document.getElementById('btn2').onclick = function() {
    // Decode Base64 to Bytes and create Blob
    var bytes = decodeBase64ToBytes(blobContent);
    var blob = new Blob([bytes], { type: 'text/html; charset=utf-8' });
    var url = URL.createObjectURL(blob);
    let t = window.open(url, '_blank');
    if (t) { document.getElementById('stat').innerText = 'Deployed Base64 Blob'; } 
    else { document.getElementById('stat').innerText = 'Popup Blocked'; }
};

document.getElementById('btn3').onclick = function() {
    // Use Base64 string directly
    let enc = 'data:text/html;base64,' + blobContent;
    navigator.clipboard.writeText(enc).then(function() {
      document.getElementById('stat').innerText = 'Copied Data URL';
      document.getElementById('hint').classList.add('show');
      setTimeout(function(){ document.getElementById('hint').classList.remove('show'); }, 3000);
    }).catch(function() {
      document.getElementById('stat').innerText = 'Manual Copy Required';
      let i = document.createElement('input'); i.value = enc; i.className = 'fb'; i.readOnly = true;
      document.querySelector('.btn-container').appendChild(i); i.select();
      document.getElementById('hint').classList.add('show');
    });
};
</script>
